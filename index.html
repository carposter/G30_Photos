<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>carposterrs - Maşın Posterləri🛍️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
}

/* ================= GRID ================= */

.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:contain; /* Kəsilməməsi üçün */
    background:#000;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* ================= LIGHTBOX ================= */

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:85%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    cursor:pointer;
}

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    cursor:pointer;
    padding:10px;
    user-select:none;
}

.prev{ left:30px; }
.next{ right:30px; }

/* ================= INSTAGRAM CARD ================= */

.instagram-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;
    background:#1a1a1a;
    padding:15px 20px;
    border-radius:15px;
    max-width:600px;
    margin:40px auto;
    border:1px solid #2a2a2a;
    transition:0.3s;
}

.instagram-card:hover{
    transform:scale(1.02);
    border-color:#E1306C;
}

.instagram-card img{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #E1306C;
}

.username{
    font-weight:bold;
    font-size:1.1rem;
}

.follow-btn{
    padding:8px 18px;
    background:#E1306C;
    color:white;
    text-decoration:none;
    border-radius:20px;
    font-weight:bold;
    transition:0.3s;
}

.follow-btn:hover{
    background:#c8235c;
    transform:scale(1.05);
}

/* ================= RESPONSIVE ================= */

@media(max-width:600px){
    .gallery{
        grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    }

    .instagram-card{
        flex-direction:column;
        text-align:center;
    }

    .follow-btn{
        width:100%;
    }
}
</style>
</head>
<body>

<!-- ================= GALLERY ================= -->

<div class="gallery">
    <img src="1.jpeg" onclick="openLightbox(0)">
    <img src="2.jpeg" onclick="openLightbox(1)">
    <img src="3.jpeg" onclick="openLightbox(2)">
    <img src="4.jpeg" onclick="openLightbox(3)">
    <img src="5.jpeg" onclick="openLightbox(4)">
    <img src="6.jpeg" onclick="openLightbox(5)">
    <img src="7.jpeg" onclick="openLightbox(6)">
</div>

<!-- ================= LIGHTBOX ================= -->

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="arrow prev" onclick="changeSlide(-1)">&#10094;</span>
    <img id="lightbox-img">
    <span class="arrow next" onclick="changeSlide(1)">&#10095;</span>
</div>

<!-- ================= INSTAGRAM CARD ================= -->

<div class="instagram-card">
    <img src="logo.png" alt="Instagram Profile">
    <div>
        <div class="username">@carposterrs</div>
        <div style="font-size:0.9rem;color:#ccc;">
            Bizi instagramda izləyin
        </div>
    </div>
    <a class="follow-btn" href="https://www.instagram.com/carposterrs/" target="_blank">
        Follow
    </a>
</div>

<script>
let currentIndex = 0;

const images = [
    "1.jpeg",
    "2.jpeg",
    "3.jpeg",
    "4.jpeg",
    "5.jpeg",
    "6.jpeg",
    "7.jpeg"
];

function openLightbox(index){
    currentIndex = index;
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = images[currentIndex];
}

function closeLightbox(){
    document.getElementById("lightbox").style.display = "none";
}

function changeSlide(direction){
    currentIndex += direction;

    if(currentIndex < 0){
        currentIndex = images.length - 1;
    }

    if(currentIndex >= images.length){
        currentIndex = 0;
    }

    document.getElementById("lightbox-img").src = images[currentIndex];
}

document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeLightbox();
    }
});
</script>

</body>

</html>
